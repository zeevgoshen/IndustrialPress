name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Verify Docker (Testcontainers)
        run: docker info

      - name: Restore
        run: dotnet restore IndustrialPress.sln

      - name: Build
        run: dotnet build IndustrialPress.sln --no-restore -c Release

      - name: Test
        run: >
          dotnet test IndustrialPress.sln
          --no-build -c Release
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
        env:
          DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.trx"
          if-no-files-found: ignore

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend install & build
        working-directory: frontend/web
        run: |
          npm install
          npm run build

      - name: Validate docker-compose
        run: docker compose config

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build rest-api sql-data iot-telemetry frontend
