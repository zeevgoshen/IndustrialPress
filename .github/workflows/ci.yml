name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore IndustrialPress.sln

      - name: Build
        run: dotnet build IndustrialPress.sln --no-restore -c Release

      - name: Test
        run: dotnet test IndustrialPress.sln --no-build -c Release --verbosity normal

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web/package.json

      - name: Frontend install & build
        working-directory: frontend/web
        run: |
          npm install
          npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker compose build rest-api sql-data iot-telemetry frontend
